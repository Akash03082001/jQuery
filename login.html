<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./login.css">
     <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.5/jquery.validate.js"></script>
</head>
<body>

    <div class="main">
        <div class="login-box">
            <div class="right">
                <img src="./iconblast-password-9283909_1920.png" alt="registerPage">
            </div>

            <div class="left">
                <h2>Login</h2>
                <form id="loginForm">
                <input type="text" name="email" class="email" id="email" placeholder="Email">
                <input type="password" name="password" class="password" id="password" placeholder="Password">
                <button>LOGIN</button>
                </form>
                <p class="status-msg"></p>
            <p class="login">New User? <a href="./register.html"> Register →</a></p>

        
            </div>

        </div>
        

    </div>
    
    <!-- jQuery -->
   
    <script src="./login.js"></script>
</body>
</html>
