<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.5/jquery.validate.js"></script>
</head>
<body>

    <div class="main">
        <div class="register-box">
            <div class="left">
                <img src="./LoginPage.png" alt="registerPage">
            </div>

            <div class="right">
                <h2>REGISTER</h2>
                <form id="registerForm">
                <input type="email" name="email" class="email" id="email" placeholder="Email">
                <input type="password" name="password" class="password" id="password" placeholder="Password">
                <input type="password" name="cpassword" class="cpassword" id="cpassword" placeholder="Confirm Password">
                <button>REGISTER</button>
                </form>
                <p class="status-msg"></p>
            <p class="register">Already a User? <a href="./login.html">Login →</a></p>

        
            </div>

        </div>
        

    </div>
    
    <!-- jQuery -->
    
    <script src="./register.js"></script>
</body>
</html>
