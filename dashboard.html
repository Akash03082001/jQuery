<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- DataTables -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

    <!-- DateRange Picker -->
     <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.css" />

    <!-- Your CSS -->
    <link rel="stylesheet" href="./dashboard.css">
</head>

<body>

<!-- ✅ Navbar -->
<div class="navBar">
    <ul>
        <li>Home</li>
        <li id="logout">Logout</li>
    </ul>
</div>

<!-- ✅ Table -->
<div class="tableEmp">
    <h2>Employee Table</h2>

    <div class="box">
        <table id="employeeTable" class="display">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Salary</th>
                    <th>Age</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<!-- ✅ DATE PICKER -->
<div class="date">
    <input type="text" id="datefilter" class="form-control mt-3" placeholder="Select Date Range" />
    <p id="dateMessage">Select date range to view your diet plan 📊</p>

    <!-- Chart -->
<div class="container mt-4 text-center">

    <div id="chartContainer"></div>
     <h4 id="monthTitle"></h4>

    <div class="mt-3 nav-button">
        <button id="prevBtn" class="btn btn-secondary">Prev</button>
        <button id="nextBtn" class="btn btn-primary">Next</button>
    </div>

    <div id="pieContainer" ></div>

</div>
</div>



<!-- ✅ Footer -->
<div class="footer bg-dark text-light">
  
        <ul class="nav justify-content-center border-bottom pb-2 mb-2">

    <li class="nav-item">
        <a href="#" class="nav-link px-2 text-light">Home</a>
    </li>

    <li class="nav-item">
        <a href="#" class="nav-link px-2 text-light">Features</a>
    </li>

    <li class="nav-item">
        <a href="#" class="nav-link px-2 text-light">Pricing</a>
    </li>

    <li class="nav-item">
        <a href="#" class="nav-link px-2 text-light">FAQs</a>
    </li>

    <li class="nav-item">
        <a href="#" class="nav-link px-2 text-light">About</a>
    </li>

</ul>
        <p class="text-center">© 2026 BUSOFT</p>
   
</div>

<!-- ✅ Scripts -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/momentjs/latest/moment.min.js"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.min.js"></script>
<script src="https://code.highcharts.com/highcharts.js"></script>
<script src="./dashboard.js"></script>

</body>
</html>
